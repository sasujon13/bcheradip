# cheradip.com — nginx reference (Ubuntu).
# Install: merge the `location` blocks below into your existing server { } for cheradip.com.
#
# CRITICAL ORDER (top → bottom):
#   1. /ailt/api/     → FastAPI (ailt_api on 8790) — MUST be before location /
#   2. /api/          → Django (if you still use cheradip MCQ API)
#   3. /              → Angular static (fcheradip dist → /var/www/cheradip/)
#
# Angular route `path: 'ailt'` is only https://cheradip.com/ailt — NOT /ailt/api/*.
# Browser or app calls to /ailt/api/health must hit nginx proxy, never index.html.

server {
    listen 443 ssl http2;
    server_name cheradip.com www.cheradip.com;

    # ssl_certificate ... (your existing certs)

    root /var/www/cheradip;
    index index.html;

    # --- 1. AILT App API (FastAPI) — Android app + guest AI + billing ---
    location /ailt/api/ {
        proxy_pass http://127.0.0.1:8790/api/ailt/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 32m;
    }

    # --- 2. Django MCQ API (unchanged) — adjust if your path differs ---
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8000/api/;
    #     ...
    # }

    # --- 3. Angular SPA (fcheradip) — catch-all LAST ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# After edit:
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -s https://cheradip.com/ailt/api/health | python3 -m json.tool
# Expect JSON with "service": "cheradip-ailt-api" — NOT Cheradip HTML.
