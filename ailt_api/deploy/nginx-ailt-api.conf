# Add INSIDE your cheradip.com server { } block — BEFORE `location /` (Angular try_files).
# See deploy/nginx-cheradip-com.conf for full server-block reference.
# Angular route `ailt` is only https://cheradip.com/ailt — NOT /ailt/api/*.
# Email links: use https://cheradip.com/ailt (HTML manual). API: /ailt/api/ only below.
# Then: sudo nginx -t && sudo systemctl reload nginx

location /ailt/api/ {
    proxy_pass http://127.0.0.1:8790/api/ailt/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    client_max_body_size 32m;
}
