# Email logo PNGs for OTP HTML — stable public URLs
#
# WHY: Angular SPA (location /) returns index.html for missing paths, so
#      https://cheradip.com/assets/email/ shows "Cheradip" with no images.
#      Production ng build also hashes asset names (cheradip-wordmark.abc123.png).
#
# WHAT: Serve fixed filenames directly from ailt_api (not Angular dist).
#
# WHERE: Paste inside cheradip.com server { } in this order:
#   1. location /ailt/api/     (nginx-ailt-api.conf)
#   2. location /.well-known/  (nginx-bimi-wellknown.conf — optional)
#   3. blocks below            (this file)
#   4. location /              (Angular SPA — must stay last)
#
# AFTER logo changes:
#   bash ailt_api/scripts/build-email-assets.sh
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust path if your home directory differs:
#   /home/sasha/apps/cheradip/bcheradip/ailt_api/app/assets/email/

location = /assets/email/cheradip-avatar.png {
    alias /home/sasha/apps/cheradip/bcheradip/ailt_api/app/assets/email/cheradip-avatar.png;
    default_type image/png;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
    log_not_found off;
}

location = /assets/email/cheradip-wordmark.png {
    alias /home/sasha/apps/cheradip/bcheradip/ailt_api/app/assets/email/cheradip-wordmark.png;
    default_type image/png;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
    log_not_found off;
}

# Do not fall through to Angular for /assets/email/ directory URL
location = /assets/email/ {
    return 404;
}

location ^~ /assets/email/ {
    return 404;
}

# Verify (expect HTTP/2 200 and Content-Type: image/png):
#   curl -sI https://cheradip.com/assets/email/cheradip-wordmark.png | head -5
#   curl -sI https://cheradip.com/assets/email/cheradip-avatar.png | head -5
#
# Fallback if nginx not updated yet — in ailt_api/.env:
#   EMAIL_ASSETS_BASE_URL=https://cheradip.com/ailt/api/assets/email
