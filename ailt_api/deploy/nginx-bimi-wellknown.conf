# Add inside cheradip.com nginx server { } — serves BIMI logo + certificate PEM
# Files live in: ailt_api/deploy/bimi/ (logo.svg, cert.pem after DigiCert issues CMC)
# Then: sudo nginx -t && sudo systemctl reload nginx

location /.well-known/bimi/ {
    alias /home/sasha/apps/cheradip/bcheradip/ailt_api/deploy/bimi/;
    add_header Access-Control-Allow-Origin *;
    types {
        image/svg+xml svg;
        application/x-pem-file pem;
    }
}
