# /ailt on cheradip.com — HTML user manual (email links)

| URL | What users see | Served by |
|-----|----------------|-----------|
| `https://cheradip.com/ailt` | **HTML user manual** (AILT services guide) | **Angular** — route `path: 'ailt'` → `AiltManualComponent` |
| `https://cheradip.com/ailt/api/*` | JSON API (Android app, health) | **nginx** → FastAPI `:8790` |

Use **`https://cheradip.com/ailt`** in emails. Do **not** link users to `/ailt/api/`.

Nginx: proxy **only** `location /ailt/api/` — never `location /ailt/`.  
Install API proxy: `sudo bash ailt_api/deploy/install-nginx-ailt-api.sh` (see `ailt_api/deploy/NGINX_INSTALL.md`).
